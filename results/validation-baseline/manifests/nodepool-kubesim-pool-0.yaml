apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: kubesim-pool-0
spec:
  template:
    spec:
      requirements:
      - key: node.kubernetes.io/instance-type
        operator: In
        values:
        - m5.xlarge
        - m5.2xlarge
      - key: kubernetes.io/arch
        operator: In
        values:
        - amd64
      - key: karpenter.sh/capacity-type
        operator: In
        values:
        - on-demand
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1
        kind: EC2NodeClass
        name: kubesim-pool-0
  limits:
    cpu: '80'
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
