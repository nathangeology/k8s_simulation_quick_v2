apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-0
  labels: &id001
    app.kubernetes.io/name: web-app-0
    app.kubernetes.io/part-of: validation-baseline
    kubesim.io/workload-type: web_app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web-app-0
  template:
    metadata:
      labels: *id001
    spec:
      containers:
      - name: web-app
        image: kubesim/web-app:latest
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 8080
