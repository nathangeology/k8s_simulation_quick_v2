apiVersion: batch/v1
kind: Job
metadata:
  name: batch-job-3
  labels: &id001
    app.kubernetes.io/name: batch-job-3
    app.kubernetes.io/part-of: validation-baseline
    kubesim.io/workload-type: batch_job
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3
  template:
    metadata:
      labels: *id001
    spec:
      containers:
      - name: batch-job
        image: kubesim/batch-job:latest
        resources:
          requests:
            cpu: '1'
            memory: 2Gi
          limits:
            cpu: '2'
            memory: 4Gi
      restartPolicy: Never
