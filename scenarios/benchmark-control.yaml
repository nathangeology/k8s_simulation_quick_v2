study:
  name: benchmark-control
  runs: 1000
  time_mode: wall_clock

  cluster:
    node_pools:
      - instance_types: [m5.xlarge, m5.2xlarge]
        min_nodes: 0
        max_nodes: 200
        karpenter:
          consolidation: {policy: WhenUnderutilized}

  workloads:
    # Deployment A: starts at 1 replica, scales out to 500, then scales in
    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "3.5Gi", max: "3.5Gi"}
      scale_up:
        - {at: "10s", set_replicas: 500}    # rapid scale-out burst
      scale_down:
        - {at: "15m", reduce_by: 150}       # 500 → 350
        - {at: "25m", reduce_by: 340}       # 350 → 10

    # Deployment B: starts at 1 replica, scales out to 500, then scales in
    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "6.5Gi", max: "6.5Gi"}
      scale_up:
        - {at: "10s", set_replicas: 500}    # rapid scale-out burst
      scale_down:
        - {at: "15m", reduce_by: 150}       # 500 → 350
        - {at: "25m", reduce_by: 340}       # 350 → 10

  variants:
    - name: baseline
      scheduler: {scoring: LeastAllocated, weight: 1}
