study:
  name: disruption-budget-stress
  runs: 50
  time_mode: logical

  cluster:
    node_pools:
      - instance_types: [m5.xlarge, m5.2xlarge]
        min_nodes: 50
        max_nodes: 60
        karpenter:
          consolidation: {policy: WhenUnderutilized}

  workloads:
    # Large deployment across all 50 nodes, then scale down 80%
    - type: web_app
      count: 1
      replicas: {fixed: 200}
      cpu_request: {dist: uniform, min: "500m", max: "1000m"}
      memory_request: {dist: uniform, min: "256Mi", max: "512Mi"}
      scale_down:
        - {at: "50", reduce_by: 160}

  variants:
    - name: budget_5pct
      karpenter_version: v1
      disruption_budget:
        max_percent: 5
    - name: budget_10pct
      karpenter_version: v1
      disruption_budget:
        max_percent: 10
    - name: budget_20pct
      karpenter_version: v1
      disruption_budget:
        max_percent: 20

  metrics:
    compare:
      - total_cost
      - node_count_over_time
