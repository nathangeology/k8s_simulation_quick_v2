# Decision ratio threshold sensitivity — homogeneous workload
# Uniform pod sizes and same priority create a narrow decision ratio distribution.
# Tests whether threshold has meaningful effect when all candidates look similar.
study:
  name: threshold-sensitivity-homogeneous
  runs: 100
  time_mode: wall_clock
  catalog_provider: kwok

  cluster:
    node_pools:
      - instance_types:
          - c-4x-amd64-linux
          - c-8x-amd64-linux
          - c-16x-amd64-linux
        min_nodes: 0
        max_nodes: 80
        karpenter:
          consolidation:
            policy: WhenUnderutilized
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
    delays:
      node_startup: "30s"
      node_shutdown: "5s"
      provisioner_batch: "10s"

  workloads:
    - type: web_app
      count: 15
      replicas:
        fixed: 8
      cpu_request:
        dist: uniform
        min: "250m"
        max: "250m"
      memory_request:
        dist: uniform
        min: "512Mi"
        max: "512Mi"
      priority: medium
      traffic: diurnal
      scale_down:
        - {at: "12h", reduce_by: 5}

  traffic_pattern:
    type: diurnal
    peak_multiplier: 4.0
    duration: "24h"

  variants:
    - name: aggressive
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 0.5
    - name: break-even
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 1.0
    - name: conservative
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 1.5
    - name: cautious
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 2.0
    - name: minimal-disruption
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 3.0

  metrics:
    compare:
      - total_cost_per_hour
      - node_count
      - running_pods
      - pending_pods
      - pods_evicted
