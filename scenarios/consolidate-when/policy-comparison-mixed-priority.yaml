# ConsolidateWhen policy comparison — mixed priority with PDBs
# High-priority web apps with PDBs + low-priority batch creates nodes with
# very different disruption costs. WhenCostJustifiesDisruption should protect
# high-priority nodes while aggressively consolidating low-priority ones.
study:
  name: consolidate-when-mixed-priority
  runs: 100
  time_mode: wall_clock
  catalog_provider: kwok

  cluster:
    node_pools:
      - instance_types:
          - c-4x-amd64-linux
          - c-8x-amd64-linux
          - c-16x-amd64-linux
          - c-32x-amd64-linux
          - m-4x-amd64-linux
          - m-8x-amd64-linux
          - m-16x-amd64-linux
          - m-32x-amd64-linux
          - s-4x-amd64-linux
          - s-8x-amd64-linux
        min_nodes: 0
        max_nodes: 120
        karpenter:
          consolidation:
            policy: WhenUnderutilized
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
      - name: node-agent
        cpu_request: "50m"
        memory_request: "128Mi"
    delays:
      node_startup: "30s"
      node_startup_jitter: "10s"
      node_shutdown: "5s"
      provisioner_batch: "10s"

  workloads:
    # High-priority latency-sensitive services with PDBs
    - type: web_app
      count: 5
      replicas:
        fixed: 8
      cpu_request:
        dist: uniform
        min: "250m"
        max: "500m"
      memory_request:
        dist: uniform
        min: "256Mi"
        max: "512Mi"
      priority: high
      traffic: diurnal
      pdb:
        min_available: "80%"
      topology_spread:
        max_skew: 1
        topology_key: kubernetes.io/hostname
      scale_down:
        - {at: "12h", reduce_by: 5}

    # Medium-priority microservices
    - type: saas_microservice
      count: 8
      replicas:
        fixed: 4
      cpu_request:
        dist: uniform
        min: "100m"
        max: "250m"
      memory_request:
        dist: uniform
        min: "128Mi"
        max: "256Mi"
      priority: medium
      traffic: diurnal
      pdb:
        min_available: "50%"
      scale_down:
        - {at: "12h", reduce_by: 2}

    # Low-priority batch jobs — expendable
    - type: batch_job
      count: 8
      priority: low
      cpu_request:
        dist: uniform
        min: "500m"
        max: "2000m"
      memory_request:
        dist: uniform
        min: "512Mi"
        max: "2Gi"
      duration:
        dist: exponential
        mean: "3h"

  traffic_pattern:
    type: diurnal
    peak_multiplier: 4.0
    duration: "24h"

  variants:
    - name: when-empty
      karpenter_version: "v1"
    - name: when-underutilized
      karpenter_version: "v1"

  metrics:
    compare:
      - total_cost_per_hour
      - node_count
      - running_pods
      - pending_pods
      - pods_evicted
