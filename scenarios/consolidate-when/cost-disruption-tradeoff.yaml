# Cost vs disruption tradeoff curve
# 10 threshold variants from 0.25 to 5.0 to map the Pareto frontier.
# Plot: total_cost_per_hour (x) vs pods_evicted (y) per variant.
#
# NOTE: Requires simulator support for decision_ratio_threshold.
# Threshold values documented in comments; single baseline variant for now.
study:
  name: cost-disruption-tradeoff
  runs: 100
  time_mode: wall_clock
  catalog_provider: kwok

  cluster:
    node_pools:
      - instance_types:
          - c-4x-amd64-linux
          - c-8x-amd64-linux
          - c-16x-amd64-linux
          - c-32x-amd64-linux
          - m-4x-amd64-linux
          - m-8x-amd64-linux
          - m-16x-amd64-linux
          - m-32x-amd64-linux
          - s-4x-amd64-linux
          - s-8x-amd64-linux
        min_nodes: 0
        max_nodes: 120
        karpenter:
          consolidation:
            policy: WhenUnderutilized
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
    delays:
      node_startup: "30s"
      node_startup_jitter: "10s"
      node_shutdown: "5s"
      provisioner_batch: "10s"

  workloads:
    - type: web_app
      count: 6
      replicas:
        fixed: 8
      scaling:
        type: hpa
        metric: cpu
        target: "70%"
      cpu_request:
        dist: uniform
        min: "250m"
        max: "750m"
      memory_request:
        dist: uniform
        min: "256Mi"
        max: "768Mi"
      priority: high
      traffic: diurnal
      pdb:
        min_available: "50%"
      scale_down:
        - {at: "12h", reduce_by: 5}

    - type: saas_microservice
      count: 8
      replicas:
        fixed: 5
      cpu_request:
        dist: uniform
        min: "100m"
        max: "300m"
      memory_request:
        dist: uniform
        min: "128Mi"
        max: "384Mi"
      priority: medium
      traffic: diurnal
      scale_down:
        - {at: "12h", reduce_by: 3}

    - type: batch_job
      count: 6
      priority: low
      cpu_request:
        dist: uniform
        min: "500m"
        max: "2000m"
      memory_request:
        dist: uniform
        min: "512Mi"
        max: "2Gi"
      duration:
        dist: exponential
        mean: "2h"

  traffic_pattern:
    type: diurnal
    peak_multiplier: 4.0
    duration: "24h"

  # Intended 10-point threshold sweep (requires ConsolidateWhen support):
  # consolidate_when variants:
  #   threshold-0.25: { policy: WhenCostJustifiesDisruption, threshold: 0.25 }
  #   threshold-0.50: { policy: WhenCostJustifiesDisruption, threshold: 0.50 }
  #   threshold-0.75: { policy: WhenCostJustifiesDisruption, threshold: 0.75 }
  #   threshold-1.00: { policy: WhenCostJustifiesDisruption, threshold: 1.00 }
  #   threshold-1.25: { policy: WhenCostJustifiesDisruption, threshold: 1.25 }
  #   threshold-1.50: { policy: WhenCostJustifiesDisruption, threshold: 1.50 }
  #   threshold-2.00: { policy: WhenCostJustifiesDisruption, threshold: 2.00 }
  #   threshold-3.00: { policy: WhenCostJustifiesDisruption, threshold: 3.00 }
  #   threshold-4.00: { policy: WhenCostJustifiesDisruption, threshold: 4.00 }
  #   threshold-5.00: { policy: WhenCostJustifiesDisruption, threshold: 5.00 }
  variants:
    - name: baseline-underutilized
      karpenter_version: "v1"

  metrics:
    compare:
      - total_cost_per_hour
      - node_count
      - running_pods
      - pending_pods
      - pods_evicted
