study:
  name: '000'
  runs: 1
  time_mode: wall_clock
  cluster:
    node_pools:
    - instance_types:
      - m5.large
      min_nodes: 1
      max_nodes: 11
      karpenter:
        consolidation:
          policy: WhenUnderutilized
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 1
      max: 1
    churn: low
    traffic: steady
    pdb:
      min_available: '1'
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
