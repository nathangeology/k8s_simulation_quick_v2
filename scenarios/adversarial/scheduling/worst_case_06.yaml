study:
  name: '000'
  runs: 1
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - m5.large
      - p3.8xlarge
      - m5.xlarge
      - c6i.large
      - g4dn.xlarge
      min_nodes: 5
      max_nodes: 68
      karpenter:
        consolidation:
          policy: WhenUnderutilized
  workloads:
  - type: web_app
    count: 13
    replicas:
      min: 5
      max: 28
    churn: low
    traffic: diurnal
    cpu_request:
      dist: uniform
      min: 50m
      max: 2001m
  - type: web_app
    count: 7
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  traffic_pattern:
    type: diurnal
    peak_multiplier: 1.5
    duration: 12h
