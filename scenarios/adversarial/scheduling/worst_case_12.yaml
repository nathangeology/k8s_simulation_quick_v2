study:
  name: '000'
  runs: 50
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - m5.large
      min_nodes: 1
      max_nodes: 11
      karpenter:
        consolidation:
          policy: WhenUnderutilized
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
