study:
  name: '000'
  runs: 1
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - m6i.2xlarge
      min_nodes: 1
      max_nodes: 11
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  variants:
  - name: most_allocated
    scheduler:
      scoring: MostAllocated
      weight: 1
  - name: least_allocated
    scheduler:
      scoring: LeastAllocated
      weight: 1
  metrics:
    compare:
    - total_cost_per_hour
    - node_count
    - running_pods
    - pending_pods
