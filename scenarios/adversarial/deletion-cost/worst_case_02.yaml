# Adversarial scenario #2 — divergence: 0.3000
# 5-way deletion cost ranking comparison
study:
  name: '000'
  runs: 10
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - c5.xlarge
      - r5.xlarge
      min_nodes: 2
      max_nodes: 100
      karpenter:
        consolidation:
          policy: WhenUnderutilized
    - instance_types:
      - m5.large
      min_nodes: 1
      max_nodes: 11
      karpenter:
        consolidation:
          policy: WhenEmpty
    - instance_types:
      - m5.large
      min_nodes: 1
      max_nodes: 11
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 8
      max: 14
    churn: low
    traffic: diurnal
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  traffic_pattern:
    type: diurnal_with_spike
    peak_multiplier: 1.5
    duration: 12h
  variants:
  - name: baseline
    deletion_cost_strategy: none
  - name: smallest_first
    deletion_cost_strategy: prefer_emptying_nodes
  - name: largest_first
    deletion_cost_strategy: largest_first
  - name: unallocated_vcpu
    deletion_cost_strategy: unallocated_vcpu
  - name: random
    deletion_cost_strategy: random
