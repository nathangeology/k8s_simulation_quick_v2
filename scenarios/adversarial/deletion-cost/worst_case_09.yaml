# Adversarial scenario #9 — divergence: 0.0391
# 5-way deletion cost ranking comparison
study:
  name: nzp
  runs: 5750
  time_mode: wall_clock
  cluster:
    node_pools:
    - instance_types:
      - p3.8xlarge
      - m5.large
      min_nodes: 2
      max_nodes: 71
    - instance_types:
      - p3.8xlarge
      - c5.xlarge
      min_nodes: 5
      max_nodes: 100
      karpenter:
        consolidation:
          policy: WhenEmpty
    - instance_types:
      - c6i.large
      - p3.8xlarge
      min_nodes: 1
      max_nodes: 46
      karpenter:
        consolidation:
          policy: WhenUnderutilized
  workloads:
  - type: batch_job
    count: 18
    priority: low
  - type: web_app
    count: 1
    replicas:
      min: 392
      max: 852
    churn: low
    traffic: steady
  - type: web_app
    count: 5
    replicas:
      min: 11
      max: 39
    churn: low
    traffic: steady
    pod_anti_affinity:
      topology_key: kubernetes.io/hostname
    topology_spread:
      max_skew: 1
      topology_key: topology.kubernetes.io/zone
  - type: batch_job
    count: 18
    priority: low
  - type: batch_job
    count: 49
    priority: high
    cpu_request:
      dist: uniform
      min: 4000m
      max: 8000m
    memory_request:
      dist: uniform
      min: 16384Mi
      max: 65536Mi
    duration:
      dist: lognormal
      mean: 2h
      std: 9h
  - type: batch_job
    count: 82
    priority: high
    cpu_request:
      dist: uniform
      min: 4000m
      max: 8000m
    memory_request:
      dist: uniform
      min: 16384Mi
      max: 65536Mi
    duration:
      dist: exponential
      mean: 422m
  traffic_pattern:
    type: diurnal
    peak_multiplier: 1.5
    duration: 12h
  variants:
  - name: baseline
    deletion_cost_strategy: none
  - name: smallest_first
    deletion_cost_strategy: prefer_emptying_nodes
  - name: largest_first
    deletion_cost_strategy: largest_first
  - name: unallocated_vcpu
    deletion_cost_strategy: unallocated_vcpu
  - name: random
    deletion_cost_strategy: random
