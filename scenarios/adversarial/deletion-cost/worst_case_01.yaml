# Adversarial scenario #1 — divergence: 1.3600
# 5-way deletion cost ranking comparison
study:
  name: chaos-000
  runs: 100
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - c5.4xlarge
      min_nodes: 1
      max_nodes: 125
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 447
      max: 866
    churn: low
    traffic: steady
  - type: batch_job
    count: 6
    priority: low
    cpu_request:
      dist: uniform
      min: 450m
      max: 17134m
    memory_request:
      dist: uniform
      min: 2533Mi
      max: 12575Mi
    duration:
      dist: exponential
      mean: 467m
  - type: batch_job
    count: 2
    priority: low
  scale_down_pattern: cliff
  traffic_pattern:
    type: diurnal
    peak_multiplier: 1.5
    duration: 12h
  variants:
  - name: baseline
    deletion_cost_strategy: none
  - name: smallest_first
    deletion_cost_strategy: prefer_emptying_nodes
  - name: largest_first
    deletion_cost_strategy: largest_first
  - name: unallocated_vcpu
    deletion_cost_strategy: unallocated_vcpu
  - name: random
    deletion_cost_strategy: random
