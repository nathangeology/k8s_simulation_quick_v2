# Adversarial scenario #3 — divergence: 0.1333
# 5-way deletion cost ranking comparison
study:
  name: '000'
  runs: 5
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - p3.8xlarge
      - m5.large
      min_nodes: 2
      max_nodes: 71
    - instance_types:
      - p3.8xlarge
      - c5.xlarge
      min_nodes: 5
      max_nodes: 100
      karpenter:
        consolidation:
          policy: WhenEmpty
    - instance_types:
      - c6i.large
      - p3.8xlarge
      min_nodes: 1
      max_nodes: 46
      karpenter:
        consolidation:
          policy: WhenUnderutilized
  workloads:
  - type: batch_job
    count: 5
    priority: low
  - type: web_app
    count: 5
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  traffic_pattern:
    type: diurnal
    peak_multiplier: 1.5
    duration: 48h
  variants:
  - name: baseline
    deletion_cost_strategy: none
  - name: smallest_first
    deletion_cost_strategy: prefer_emptying_nodes
  - name: largest_first
    deletion_cost_strategy: largest_first
  - name: unallocated_vcpu
    deletion_cost_strategy: unallocated_vcpu
  - name: random
    deletion_cost_strategy: random
