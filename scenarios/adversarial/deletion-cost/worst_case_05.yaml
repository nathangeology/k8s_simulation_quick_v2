# Adversarial scenario #5 — divergence: 0.0515
# 5-way deletion cost ranking comparison
study:
  name: '000'
  runs: 1
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - g4dn.xlarge
      - m6i.large
      - m5.xlarge
      - c6i.xlarge
      - p3.8xlarge
      min_nodes: 1
      max_nodes: 27
      karpenter:
        consolidation:
          policy: WhenUnderutilized
    - instance_types:
      - m5.large
      min_nodes: 1
      max_nodes: 11
      karpenter:
        consolidation:
          policy: WhenEmpty
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  - type: web_app
    count: 8
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
    cpu_request:
      dist: uniform
      min: 50m
      max: 2001m
  - type: web_app
    count: 1
    replicas:
      min: 200
      max: 500
    churn: low
    traffic: steady
  traffic_pattern:
    type: diurnal
    peak_multiplier: 1.5
    duration: 12h
  variants:
  - name: baseline
    deletion_cost_strategy: none
  - name: smallest_first
    deletion_cost_strategy: prefer_emptying_nodes
  - name: largest_first
    deletion_cost_strategy: largest_first
  - name: unallocated_vcpu
    deletion_cost_strategy: unallocated_vcpu
  - name: random
    deletion_cost_strategy: random
