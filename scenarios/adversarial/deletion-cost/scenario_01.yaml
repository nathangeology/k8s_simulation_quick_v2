study:
  name: '000'
  runs: 2
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - m5.large
      min_nodes: 1
      max_nodes: 11
      karpenter:
        consolidation:
          policy: WhenEmpty
    - instance_types:
      - m5.xlarge
      min_nodes: 1
      max_nodes: 11
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 7
      max: 11
    churn: low
    traffic: diurnal
    scale_down:
    - at: '50'
      reduce_by: 6
  - type: ml_training
    count: 1
    replicas:
      fixed: 1
    priority: high
    scale_down:
    - at: '50'
      reduce_by: 1
