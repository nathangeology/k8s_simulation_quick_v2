# Adversarial scenario #10 — divergence: 0.0384
# 5-way deletion cost ranking comparison
study:
  name: '000'
  runs: 4097
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - c5.xlarge
      - c5.4xlarge
      min_nodes: 10
      max_nodes: 129
      karpenter:
        consolidation:
          policy: WhenEmpty
    - instance_types:
      - m5.2xlarge
      min_nodes: 1
      max_nodes: 11
      karpenter:
        consolidation:
          policy: WhenEmpty
    - instance_types:
      - m5.large
      min_nodes: 1
      max_nodes: 11
  workloads:
  - type: web_app
    count: 1
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  - type: web_app
    count: 4
    replicas:
      min: 2
      max: 11
    churn: low
    traffic: diurnal
  variants:
  - name: baseline
    deletion_cost_strategy: none
  - name: smallest_first
    deletion_cost_strategy: prefer_emptying_nodes
  - name: largest_first
    deletion_cost_strategy: largest_first
  - name: unallocated_vcpu
    deletion_cost_strategy: unallocated_vcpu
  - name: random
    deletion_cost_strategy: random
