# Adversarial scenario #7 — divergence: 0.0417
# 5-way deletion cost ranking comparison
study:
  name: '000'
  runs: 4097
  time_mode: logical
  cluster:
    node_pools:
    - instance_types:
      - c5.2xlarge
      - m5.4xlarge
      - g4dn.xlarge
      - m6i.xlarge
      min_nodes: 6
      max_nodes: 145
      karpenter:
        consolidation:
          policy: WhenUnderutilized
  workloads:
  - type: ml_training
    count: 1
    replicas:
      fixed: 1
    priority: high
    gpu_request:
      dist: choice
      values:
      - 1
      - 2
      - 4
      - 8
    cpu_request:
      dist: uniform
      min: 50m
      max: 2001m
    memory_request:
      dist: uniform
      min: 64Mi
      max: 4097Mi
  - type: ml_training
    count: 1
    replicas:
      fixed: 1
    priority: high
    gpu_request:
      dist: choice
      values:
      - 1
      - 2
      - 4
      - 8
    cpu_request:
      dist: uniform
      min: 50m
      max: 2001m
    memory_request:
      dist: uniform
      min: 64Mi
      max: 4097Mi
  - type: web_app
    count: 1
    replicas:
      min: 6
      max: 11
    churn: low
    traffic: diurnal
    cpu_request:
      dist: normal
      mean: 100m
      std: 50m
  variants:
  - name: baseline
    deletion_cost_strategy: none
  - name: smallest_first
    deletion_cost_strategy: prefer_emptying_nodes
  - name: largest_first
    deletion_cost_strategy: largest_first
  - name: unallocated_vcpu
    deletion_cost_strategy: unallocated_vcpu
  - name: random
    deletion_cost_strategy: random
