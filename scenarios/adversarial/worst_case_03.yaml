study:
  name: 3gqeqd
  runs: 3570
  time_mode: wall_clock
  cluster:
    node_pools:
    - instance_types:
      - p3.8xlarge
      min_nodes: 5
      max_nodes: 150
    - instance_types:
      - c5.large
      - p3.2xlarge
      min_nodes: 5
      max_nodes: 43
  workloads:
  - type: batch_job
    count: 15
    priority: low
    cpu_request:
      dist: normal
      mean: 1289m
      std: 1901m
  - type: batch_job
    count: 1
    priority: low
    memory_request:
      dist: uniform
      min: 1061Mi
      max: 131071Mi
    cpu_request:
      dist: uniform
      min: 887m
      max: 10000m
    duration:
      dist: exponential
      mean: 179m
  - type: ml_training
    count: 1
    replicas:
      fixed: 1
    priority: high
    memory_request:
      dist: uniform
      min: 719Mi
      max: 13394Mi
    cpu_request:
      dist: normal
      mean: 969m
      std: 1178m
    duration:
      dist: lognormal
      mean: 13h
      std: 12h
  variants:
  - name: most_allocated
    scheduler:
      scoring: MostAllocated
      weight: 1
  - name: least_allocated
    scheduler:
      scoring: LeastAllocated
      weight: 1
  metrics:
    compare:
    - total_cost_per_hour
    - node_count
    - running_pods
    - pending_pods
