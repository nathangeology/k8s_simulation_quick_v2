study:
  name: karpenter-version-comparison
  runs: 100
  time_mode: logical

  cluster:
    node_pools:
      - instance_types:
          - m5.xlarge
          - m5.2xlarge
          - c5.xlarge
          - r5.xlarge
          - m5.4xlarge
        min_nodes: 2
        max_nodes: 50
        karpenter:
          consolidation:
            policy: WhenUnderutilized

  workloads:
    - type: web_app
      count: 8
      replicas:
        min: 2
        max: 10
      scaling:
        type: hpa
        metric: cpu
        target: "70%"
      cpu_request:
        dist: uniform
        min: "250m"
        max: "500m"
      memory_request:
        dist: uniform
        min: "256Mi"
        max: "512Mi"
      priority: high
      traffic: diurnal

    - type: batch_job
      count: 6
      cpu_request:
        dist: uniform
        min: "500m"
        max: "2000m"
      memory_request:
        dist: uniform
        min: "512Mi"
        max: "2Gi"
      duration:
        dist: exponential
        mean: "2h"
      priority: low

    - type: saas_microservice
      count: 10
      replicas:
        min: 3
        max: 8
      scaling:
        type: hpa
        metric: cpu
        target: "60%"
      cpu_request:
        dist: uniform
        min: "100m"
        max: "300m"
      memory_request:
        dist: uniform
        min: "128Mi"
        max: "384Mi"
      priority: medium
      traffic: diurnal

  traffic_pattern:
    type: diurnal
    peak_multiplier: 5.0
    duration: "24h"

  variants:
    - name: karpenter-v0.35
      karpenter_version: "v0.35"
    - name: karpenter-v1.x
      karpenter_version: "v1"

  metrics:
    compare:
      - total_cost_per_hour
      - node_count
      - running_pods
      - pending_pods
      - events_processed
      - final_time
