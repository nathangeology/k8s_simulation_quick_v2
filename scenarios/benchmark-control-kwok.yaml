study:
  name: benchmark-control-kwok
  runs: 100
  time_mode: wall_clock
  catalog_provider: kwok

  cluster:
    node_pools:
      - instance_types: all-kwok
        min_nodes: 0
        max_nodes: 200
        karpenter:
          consolidation: {policy: WhenUnderutilized}
    # System daemonsets — approximate kube-proxy + system agents per node
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
      - name: node-agent
        cpu_request: "50m"
        memory_request: "256Mi"
    delays:
      node_startup: "30s"      # KWOK node registration + ready
      node_startup_jitter: "10s"  # ±10s jitter on startup
      node_shutdown: "5s"      # drain + terminate
      provisioner_batch: "10s" # Karpenter batch window
      provisioner_batch_jitter: "5s"  # ±5s batch window jitter
      pod_startup: "2s"        # scheduler bind latency

  workloads:
    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "3.5Gi", max: "3.5Gi"}
      scale_up:
        - {at: "10s", increase_to: 500}
      scale_down:
        - {at: "15m", reduce_by: 150}
        - {at: "25m", reduce_by: 340}

    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "6.5Gi", max: "6.5Gi"}
      scale_up:
        - {at: "10s", increase_to: 500}
      scale_down:
        - {at: "15m", reduce_by: 150}
        - {at: "25m", reduce_by: 340}

  # Per-transition measurement windows for sim vs KWOK comparison
  measurement_windows:
    - name: transition-500-to-350
      start: "15m"
      end: "25m"
      description: "Partial scale-down: CostJustified/Balanced should activate"
    - name: transition-350-to-10
      start: "25m"
      end: "40m"
      description: "Near-empty scale-down: Emptiness method should dominate"

  variants:
    - name: baseline
      scheduler: {scoring: LeastAllocated, weight: 1}
