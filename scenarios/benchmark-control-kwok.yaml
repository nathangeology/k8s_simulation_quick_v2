study:
  name: benchmark-control-kwok
  runs: 100
  time_mode: wall_clock
  catalog_provider: kwok

  cluster:
    node_pools:
      - instance_types: [c-1x-amd64-linux, c-2x-amd64-linux, c-4x-amd64-linux, c-8x-amd64-linux, c-16x-amd64-linux, c-32x-amd64-linux, c-48x-amd64-linux, c-64x-amd64-linux, c-96x-amd64-linux, c-128x-amd64-linux, s-1x-amd64-linux, s-2x-amd64-linux, s-4x-amd64-linux, s-8x-amd64-linux, s-16x-amd64-linux, s-32x-amd64-linux, s-48x-amd64-linux, s-64x-amd64-linux, s-96x-amd64-linux, s-128x-amd64-linux, m-1x-amd64-linux, m-2x-amd64-linux, m-4x-amd64-linux, m-8x-amd64-linux, m-16x-amd64-linux, m-32x-amd64-linux, m-48x-amd64-linux, m-64x-amd64-linux, m-96x-amd64-linux, m-128x-amd64-linux]
        min_nodes: 0
        max_nodes: 200
        karpenter:
          consolidation: {policy: WhenUnderutilized}
    # System daemonsets — approximate kube-proxy + system agents per node
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
      - name: node-agent
        cpu_request: "50m"
        memory_request: "256Mi"
    delays:
      node_startup: "30s"      # KWOK node registration + ready
      node_shutdown: "5s"      # drain + terminate
      provisioner_batch: "10s" # Karpenter batch window
      pod_startup: "2s"        # scheduler bind latency

  workloads:
    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "3.5Gi", max: "3.5Gi"}
      scale_up:
        - {at: "10s", increase_to: 500}
      scale_down:
        - {at: "15m", reduce_by: 150}
        - {at: "25m", reduce_by: 340}

    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "6.5Gi", max: "6.5Gi"}
      scale_up:
        - {at: "10s", increase_to: 500}
      scale_down:
        - {at: "15m", reduce_by: 150}
        - {at: "25m", reduce_by: 340}

  variants:
    - name: baseline
      scheduler: {scoring: LeastAllocated, weight: 1}
