      count: 1
      replicas: {fixed: 2}
      cpu_request: {dist: uniform, min: "2000m", max: "2000m"}
      memory_request: {dist: uniform, min: "2048Mi", max: "2048Mi"}
      labels: {app: adaptive-logs-api}
      scale_up:
        - {at: "1m", increase_to: 12}
        - {at: "5m", increase_to: 13}
        - {at: "10m", increase_to: 14}
        - {at: "32m", increase_to: 22}
