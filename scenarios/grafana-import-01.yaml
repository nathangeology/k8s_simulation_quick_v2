# Grafana production cluster scenario (imported from external simulator format)
# Source: scenarios/needs_conversion/k8s_import_grafana_1752595626/
# 164 deployments, 60-minute scaling timeline, ~5500 peak pods

study:
  name: grafana-import-01
  runs: 50
  time_mode: wall_clock

  cluster:
    node_pools:
      - instance_types: [m5.large, m5.xlarge, m5.2xlarge, m5.4xlarge, m5.8xlarge, m5.12xlarge, m5.16xlarge, m5.24xlarge]
        min_nodes: 0
        max_nodes: 1000
        karpenter:
          consolidation: {policy: WhenUnderutilized}
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
      - name: node-agent
        cpu_request: "50m"
        memory_request: "256Mi"
    delays:
      node_startup: "30s"
      node_startup_jitter: "10s"
      node_shutdown: "5s"
      provisioner_batch: "10s"
      provisioner_batch_jitter: "5s"
      pod_startup: "2s"

  workloads:
