# VPA gradual scale-up: models VPA-driven right-sizing where pods grow over time.
# 100 pods start at t=0 with modest resources, then grow in 3 steps.
# Tests: does Karpenter handle growing resource pressure? Infeasible resizes?
study:
  name: vpa-gradual-scaleup
  runs: 20
  time_mode: wall_clock
  catalog_provider: kwok

  cluster:
    node_pools:
      - instance_types:
          - m-4x-amd64-linux
          - m-8x-amd64-linux
        min_nodes: 0
        max_nodes: 500
        karpenter:
          consolidation:
            policy: WhenUnderutilized
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
    delays:
      node_startup: "30s"
      node_startup_jitter: "10s"
      node_shutdown: "5s"
      provisioner_batch: "10s"

  workloads:
    - type: web_app
      count: 1
      replicas: {fixed: 100}
      cpu_request: {dist: uniform, min: "500m", max: "500m"}
      memory_request: {dist: uniform, min: "1Gi", max: "1Gi"}
      resource_changes:
        - {at: "3m", cpu_request: "1000m", memory_request: "2Gi"}
        - {at: "7m", cpu_request: "1500m", memory_request: "3Gi"}
        - {at: "10m", cpu_request: "2000m", memory_request: "4Gi"}
      # Extend sim duration past last resize
      scale_down:
        - {at: "30m", reduce_by: 1}

  variants:
    - name: when-empty
      consolidate_when:
        policy: WhenEmpty

    - name: when-underutilized
      consolidate_when:
        policy: WhenEmptyOrUnderutilized

    - name: cost-justified-0.50
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 0.50

    - name: cost-justified-1.00
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 1.00

    - name: cost-justified-2.00
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 2.00

  metrics:
    compare:
      - total_cost_per_hour
      - cumulative_cost
      - node_count
      - running_pods
      - pending_pods
      - pods_evicted
      - disruption_count
      - time_weighted_node_count
      - peak_node_count
