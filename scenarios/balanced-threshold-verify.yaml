# Balanced consolidation threshold gradient verification
# Uses default RS spreading heuristic (deletion_cost_strategy: none)
# so scale-down distributes removals across nodes, leaving them partially filled.
# This activates the CostJustified/Balanced scoring path.
study:
  name: balanced-threshold-verify
  runs: 100
  time_mode: wall_clock
  catalog_provider: kwok

  cluster:
    node_pools:
      - instance_types:
          - m-4x-amd64-linux
          - m-8x-amd64-linux
        min_nodes: 0
        max_nodes: 1000
        karpenter:
          consolidation:
            policy: WhenUnderutilized
    daemonsets:
      - name: kube-proxy
        cpu_request: "100m"
        memory_request: "256Mi"
    delays:
      node_startup: "30s"
      node_startup_jitter: "10s"
      node_shutdown: "5s"
      provisioner_batch: "10s"

  workloads:
    # Deployment A: 1→500→350→10 (CPU-bound)
    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "3.5Gi", max: "3.5Gi"}
      scale_up:
        - {at: "10s", increase_to: 500}
      scale_down:
        - {at: "15m", reduce_by: 150}    # 500→350
        - {at: "25m", reduce_by: 340}    # 350→10

    # Deployment B: 1→500→350→10 (memory-bound)
    - type: web_app
      count: 1
      replicas: {fixed: 1}
      cpu_request: {dist: uniform, min: "950m", max: "950m"}
      memory_request: {dist: uniform, min: "6.5Gi", max: "6.5Gi"}
      scale_up:
        - {at: "10s", increase_to: 500}
      scale_down:
        - {at: "15m", reduce_by: 150}    # 500→350
        - {at: "25m", reduce_by: 340}    # 350→10

  measurement_windows:
    - name: transition-500-to-350
      start: "15m"
      end: "25m"
      description: "Partial scale-down: Balanced scoring should activate on partially-filled nodes"
    - name: transition-350-to-10
      start: "25m"
      end: "40m"
      description: "Near-empty scale-down: Empty path should dominate"

  variants:
    - name: when-empty
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenEmpty

    - name: balanced-k1
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 1.0

    - name: balanced-k2
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 0.5

    - name: balanced-k4
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenCostJustifiesDisruption
        decision_ratio_threshold: 0.25

    - name: when-underutilized
      karpenter_version: "v1"
      consolidate_when:
        policy: WhenEmptyOrUnderutilized

  metrics:
    compare:
      - total_cost_per_hour
      - cumulative_cost
      - node_count
      - running_pods
      - pending_pods
      - disruption_count
      - time_weighted_node_count
      - peak_node_count
