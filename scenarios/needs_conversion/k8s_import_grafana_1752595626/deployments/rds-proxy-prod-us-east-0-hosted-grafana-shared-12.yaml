apiVersion: apps/v1
kind: Deployment
metadata:
  name: rds-proxy-prod-us-east-0-hosted-grafana-shared-12
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rds-proxy-prod-us-east-0-hosted-grafana-shared-12
  template:
    metadata:
      labels:
        app: rds-proxy-prod-us-east-0-hosted-grafana-shared-12
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: rds-proxy-prod-us-east-0-hosted-grafana-shared-12-container
        image: nginx:latest
        resources:
          requests:
            cpu: '0.25'
            memory: 1024Mi
