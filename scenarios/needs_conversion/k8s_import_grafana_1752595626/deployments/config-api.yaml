apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: config-api
  template:
    metadata:
      labels:
        app: config-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: config-api-container
        image: nginx:latest
        resources:
          requests:
            cpu: '0.1'
            memory: 500Mi
