apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcached
spec:
  replicas: 0
  selector:
    matchLabels:
      app: memcached
  template:
    metadata:
      labels:
        app: memcached
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: memcached-container
        image: nginx:latest
        resources:
          requests:
            cpu: '0.5'
            memory: 6344Mi
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            name: memcached
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
