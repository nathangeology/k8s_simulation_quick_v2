apiVersion: apps/v1
kind: Deployment
metadata:
  name: parallel-querier-burst
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parallel-querier-burst
  template:
    metadata:
      labels:
        app: parallel-querier-burst
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: parallel-querier-burst-container
        image: nginx:latest
        resources:
          requests:
            cpu: '2.0'
            memory: 2048Mi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: grafana.com/platform-spot-solo
                operator: Exists
      tolerations:
      - effect: NoSchedule
        key: type
        operator: Equal
        value: spot-node
