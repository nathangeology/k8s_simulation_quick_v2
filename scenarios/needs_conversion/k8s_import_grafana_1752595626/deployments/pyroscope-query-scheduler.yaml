apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope-query-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pyroscope-query-scheduler
  template:
    metadata:
      labels:
        app: pyroscope-query-scheduler
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: pyroscope-query-scheduler-container
        image: nginx:latest
        resources:
          requests:
            cpu: '0.1'
            memory: 256Mi
