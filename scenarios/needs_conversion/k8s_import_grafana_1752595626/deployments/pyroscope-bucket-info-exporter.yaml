apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope-bucket-info-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope-bucket-info-exporter
  template:
    metadata:
      labels:
        app: pyroscope-bucket-info-exporter
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: pyroscope-bucket-info-exporter-container
        image: nginx:latest
        resources:
          requests:
            cpu: '0.1'
            memory: 128Mi
