apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcached-metric-name-cache
spec:
  replicas: 6
  selector:
    matchLabels:
      app: memcached-metric-name-cache
  template:
    metadata:
      labels:
        app: memcached-metric-name-cache
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: memcached-metric-name-cache-container
        image: nginx:latest
        resources:
          requests:
            cpu: '0.5'
            memory: 9931Mi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                name: memcached-metric-name-cache
            topologyKey: kubernetes.io/hostname
