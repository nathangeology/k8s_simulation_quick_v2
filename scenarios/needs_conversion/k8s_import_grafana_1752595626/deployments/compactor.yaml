apiVersion: apps/v1
kind: Deployment
metadata:
  name: compactor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compactor
  template:
    metadata:
      labels:
        app: compactor
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: compactor-container
        image: nginx:latest
        resources:
          requests:
            cpu: '12.0'
            memory: 20480Mi
