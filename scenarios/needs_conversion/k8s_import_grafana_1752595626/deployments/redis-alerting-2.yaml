apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-alerting-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-alerting-2
  template:
    metadata:
      labels:
        app: redis-alerting-2
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: redis-alerting-2-container
        image: nginx:latest
        resources:
          requests:
            cpu: '2.1'
            memory: 2148Mi
      tolerations:
      - effect: NoSchedule
        key: type
        operator: Equal
        value: data-node
