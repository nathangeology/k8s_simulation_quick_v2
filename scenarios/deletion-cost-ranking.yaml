study:
  name: deletion-cost-ranking-comparison
  runs: 10000
  time_mode: logical

  cluster:
    node_pools:
      - instance_types: [m5.xlarge, m5.2xlarge]
        min_nodes: 8
        max_nodes: 50
        karpenter:
          consolidation: {policy: WhenUnderutilized}

  workloads:
    # Single large RS — dominates node placement, scale down 80%
    - type: web_app
      count: 1
      replicas: {fixed: 40}
      cpu_request: {dist: uniform, min: "500m", max: "1000m"}
      memory_request: {dist: uniform, min: "256Mi", max: "512Mi"}
      scale_down:
        - {at: "50", reduce_by: 32}

    # Second RS — also large, scale down 75%
    - type: saas_microservice
      count: 1
      replicas: {fixed: 30}
      cpu_request: {dist: uniform, min: "500m", max: "1000m"}
      memory_request: {dist: uniform, min: "256Mi", max: "512Mi"}
      scale_down:
        - {at: "50", reduce_by: 23}

  variants:
    - name: baseline
      deletion_cost_strategy: none
    - name: smallest_first
      deletion_cost_strategy: prefer_emptying_nodes
    - name: largest_first
      deletion_cost_strategy: largest_first
    - name: unallocated_vcpu
      deletion_cost_strategy: unallocated_vcpu
    - name: random
      deletion_cost_strategy: random

  metrics:
    compare:
      - total_cost
      - node_count_over_time
